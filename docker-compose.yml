services:
  saving-bot-v0.1:
    image: node:20-slim
    container_name: saving-bot-v0.1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PUPPETEER_SKIP_DOWNLOAD=true
    command: >
      sh -c "apt-get update -qq && apt-get install -y -qq chromium && npm install --quiet && node bot.js"
    # Chromium needed by whatsapp-web.js (puppeteer)
    # Session is saved in ./session folder — persists between restarts