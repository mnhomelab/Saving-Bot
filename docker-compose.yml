services:
  saving-bot-v0.1:
    image: node:20-slim
    container_name: saving-bot-v0.1
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3001:3001"                     # Dashboard port
    volumes:
      - .:/app                          # bot source code + session
      - ./Saving-Year:/app/Saving-Year  # explicit separate mount — survives any container ops
    env_file:
      - .env
    environment:
      - PUPPETEER_SKIP_DOWNLOAD=true
    command: >
      sh -c "rm -f /app/session/session/SingletonLock /app/session/session/SingletonCookie /app/session/session/SingletonSocket && apt-get update -qq && apt-get install -y -qq chromium && npm install --quiet && node bot.js"
    # Chromium lock files are cleared on every start — self-heals after crashes
    # Saving-Year/ is mounted separately — files are safe even if session/ is wiped
    # All config loaded from .env file